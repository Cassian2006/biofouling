services:
  - type: web
    name: biofouling-api
    runtime: python
    rootDir: .
    buildCommand: pip install .
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FRONTEND_ORIGIN
        sync: false

  - type: static
    name: biofouling-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
